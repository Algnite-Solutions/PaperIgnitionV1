blog_rerank_prompt: |
  # Academic Document Retrieval System

  ## Task Objective
  Your task is to analyze a collection of academic papers and identify the 5 most relevant documents that would best help answer a given research question.

  ## Input Data
  <documents>
  {documents_text}
  </documents>

  <query>
  {query}
  </query>

  ## Detailed Instructions
  1. Carefully read and understand the research question in the <query> section.
  2. Analyze each academic document in the collection, paying attention to:
    - Relevance of the document's main topic to the query
    - Presence of specific information that directly addresses the question
    - Quality and depth of information related to the query
    - Recency and authority of the research (if applicable)
  3. Rank the documents based on their relevance to the query.
  4. Select the top 5 most relevant documents.

  ## Selection Criteria
  - Prioritize documents that directly address the specific aspects mentioned in the query
  - Consider documents with experimental evidence or empirical data related to the query
  - Include documents that provide comprehensive background information if relevant
  - Select documents that complement each other to provide a well-rounded answer

  ## Response Format
  Return ONLY the document IDs of the 5 most relevant documents, with one document ID per line, enclosed in <Documents></Documents> tags. Do not include any explanations, justifications, or additional text.

  Example response format:
  <Documents>
  doc_id_1
  doc_id_2
  doc_id_3
  doc_id_4
  doc_id_5
  </Documents>

  Provide your final list of the 5 most relevant document IDs without any preamble or additional explanations.


blog_rerank_pdf_prompt: |
  # Academic Document Retrieval System (Interest Alignment Mode)

  ## Task Objective
  Act as a **Research Scout** for a senior researcher. Your goal is to curate a reading list of 5 documents that best satisfy the user's stated **Research Interests**. You are looking for high-value signal, not just keyword matches.

  ## Input Data
  <documents>
  {documents_text}
  </documents>

  <interest_profile>
  {user_interest_description}
  </interest_profile>

  ## Detailed Instructions
  1.  **Analyze the Interest Profile:**
      * Identify the core topics (e.g., "Long-text input," "Benchmarks," "Evaluation").
      * Identify the target utility (e.g., "Assessing capabilities," "Handling lengthy documents").
      * *Crucial:* Understand that the user is looking for *tools, methods, and evidence*, not just definitions.

  2.  **Evaluate Each Document (The "Scout" Logic):**
      * **Direct Alignment:** Does this paper present a benchmark, a dataset, or a rigorous evaluation method for the specific topics in the profile?
      * **Methodological Depth:** Is the paper purely theoretical, or does it offer empirical results (tables, charts, comparisons) relevant to the interest?
      * **Authority Signal:** Is this from a key player in this specific niche (e.g., DeepMind, Anthropic, Stanford CRFM) or a top-tier venue (NeurIPS, ICLR)?

  3.  **Selection Strategy (The "3-Tier Mix"):**
      * **Tier 1: The Core Matches (3 docs):** Papers that are explicitly about the intersection of the user's interests (e.g., "A new benchmark for 100k+ token context").
      * **Tier 2: The High-Authority Broaden (1 doc):** A seminal paper from a famous lab that might be slightly broader but defines the field (e.g., a major survey on LLM evaluations).
      * **Tier 3: The Novelty/Wildcard (1 doc):** A paper applying these concepts in a unique way (e.g., "Using long-context LLMs for legal contract analysis") to spark new ideas.

  ## Ranking Logic
  Rank the top 5 documents. The list must prioritize **utility** to the researcher. A paper describing a *new benchmark* is more valuable than a paper simply *using* an old one.

  ## Response Format
  Return ONLY the document IDs of the 5 most relevant documents, with one document ID per line, enclosed in <Documents></Documents> tags.

  Example response format:
  <Documents>
  doc_id_1
  doc_id_2
  doc_id_3
  doc_id_4
  doc_id_5
  </Documents>


personalized_ranking_prompt: |
  # Academic Document Retrieval System (Personalized Mode)

  ## Task Objective
  Act as a **Research Scout** for a senior researcher. Your goal is to curate a reading list of 5 documents that best satisfy the user's **Research Interests** based on their personalized profile.

  ## User Profile
  <interest_profile>
  {user_interest_description}
  </interest_profile>
  1. **Persona Definition:**
     {persona_definition}

  2. **Negative Constraints:**
     {negative_constraints}

  3. **Ranking Heuristics:**
     {ranking_heuristics}

  ## Input Data
  <documents>
  {documents_text}
  </documents>

  ## Detailed Instructions
  1.  **Analyze the User Profile:**
      * Understand the user's research identity and focus areas from the Persona Definition
      * Note the topics to avoid from Negative Constraints
      * Apply the Ranking Heuristics when evaluating documents

  2.  **Evaluate Each Document (The "Scout" Logic):**
      * **Direct Alignment:** Does this paper match the user's persona and research interests?
      * **Constraint Check:** Does this paper violate any negative constraints?
      * **Heuristic Alignment:** How well does it match the ranking heuristics?

  3.  **Selection Strategy:**
      * Prioritize papers that strongly align with the user's persona
      * Exclude papers that match negative constraints
      * Apply ranking heuristics to break ties

  ## Ranking Logic
  Rank the top 5 documents according to the user profile. The list must prioritize **personal relevance** to the researcher.

  ## Response Format
  Return ONLY the document IDs of the 5 most relevant documents, with one document ID per line, enclosed in <Documents></Documents> tags.

  Example response format:
  <Documents>
  doc_id_1
  doc_id_2
  doc_id_3
  doc_id_4
  doc_id_5
  </Documents>


# ============================================================================
# GEPA-Style Profile Optimization Prompts
# ============================================================================

# Initial profile extraction from training data (with paper content)
profile_extraction_prompt: |
  You are a prompt engineering expert specializing in personalized academic paper recommendations.

  ## Task
  Analyze the user's reading history to extract a detailed research profile. Your goal is to understand their **core research priorities** based on what captures their limited attention.

  ## Training Data
  Below are examples from the user's recommendation feed. 
  For each session, you will see the paper the user EXPLICITLY CLICKED (Positive), alongside other papers that were on the screen at the same time but were NOT CLICKED (Contextual Alternatives).

  {training_examples}

  ## Output Requirements
  Extract the user's research profile as JSON. Focus on actionable patterns that define their specific niche.

  Output ONLY valid JSON:
  ```json
  {{
    "persona_definition": "2-3 sentences describing the user's core research identity, expertise level, and primary active interests.",
    "negative_constraints": [
      "Topics/methods to deprioritize (max 5 items).",
      "CAUTION: Only add items here if you see a consistent pattern of the user ignoring them. Do not assume 'not clicked' means 'hated'. Frame these as 'Lower priority unless...'"
    ],
    "ranking_heuristics": [
      "Tie-breaking signals that make a paper a 'Must Read' vs 'Maybe Later' (max 5 items).",
      "Derive these by asking: Why did the user prioritize the clicked paper over the contextual alternatives?"
    ]
  }}
  ```

  ### CRITICAL FORMATTING RULES
  1. Output ONLY the JSON block. No preamble, no post-amble.
  2. Ensure the JSON is valid and escaped correctly.
  3. Ensure all keys ("persona_definition", "negative_constraints", "ranking_heuristics") are present.


# ============================================================================
# Initial Pool Variants (Nudges for the extraction prompt)
# ============================================================================
initial_pool_variants:
  default: |
    
    **Special Focus:** Extract the core SUBJECT MATTER and TOPICS. What specific research domains (e.g., "LLM Efficiency," "Hardware Accelerators") are they currently focusing on? Identify the nouns of their research world.

  methodology: |

    **Special Focus:** Pay extra attention to METHODOLOGY and ANALYTICAL STYLE. Does this researcher gravitate toward specific experimental setups, rigorous evaluation metrics, or specific analytical frameworks (e.g., "Information Theory," "System-level Benchmarking")? Focus on the "verbs" and "how" of their research.

  topic_breadth: |

    **Special Focus:** Pay extra attention to TOPIC BREADTH and SCOPE. Is this researcher a "Subject Specialist" focused on a narrow niche, or an "Interdisciplinary Scout" looking for cross-domain connections? Analyze the diversity vs. depth of their interest footprint.

# Profile refinement with validation feedback
profile_refinement_prompt: |
  You are a prompt engineering expert optimizing a personalized recommendation system.

  ## Current Profile
  ```json
  {current_profile}
  ```

  ## Training Observations
  {training_examples}

  ## Validation Performance Feedback
  {performance_breakdown}

  ## Your Task
  Analyze the validation errors above. Each session shows exactly which papers the profile
  correctly selected (True Positives), incorrectly selected (False Positives), and missed
  (False Negatives).

  ### Refinement Strategy
  1. **Preserve:** Keep profile aspects that consistently produce True Positives.
  2. **Constrain:** Add or tighten negative_constraints to eliminate False Positives.
     Look for common themes — e.g., "general benchmarks", "survey papers", "specific subfield".
  3. **Expand:** Add or broaden ranking_heuristics to capture False Negatives.
     What pattern did we miss? Add a specific heuristic to catch it next time.
  4. **Diagnose overfitting:** If precision is high but recall is low, the profile is too narrow.
     If recall is high but precision is low, the profile is too broad.

  ## Output Requirements
  Output ONLY valid JSON:
  ```json
  {{
    "persona_definition": "Refined 2-3 sentence description",
    "negative_constraints": ["Updated list (max 5)"],
    "ranking_heuristics": ["Updated list (max 5)"],
    "changes_made": "Brief explanation of key changes and WHICH errors they address",
    "expected_improvement": "What you expect to improve and why",
    "confidence": "high/medium/low"
  }}
  ```


# ============================================================================
# Validation Prompts (Subset Selection with F1 metric)
# ============================================================================

# Subset selection: select ALL relevant papers (not just top-5)
personalized_subset_selection_prompt: |
  You are a research assistant helping to identify papers most relevant to a user.

  ## User Profile
  1. **Persona:** {persona_definition}
  2. **Negative Constraints:** {negative_constraints}
  3. **Ranking Heuristics:** {ranking_heuristics}

  ## Candidate Papers
  {documents_text}

  ## Detailed Instructions
  1.  **Analyze the User Profile:**
      * Understand the user's research identity and focus areas from the Persona Definition
      * Note the topics to avoid from Negative Constraints
      * Apply the Ranking Heuristics when evaluating documents

  2.  **Evaluate Each Document (The "Scout" Logic):**
      * **Direct Alignment:** Does this paper match the user's persona and research interests?
      * **Constraint Check:** Does this paper violate any negative constraints?
      * **Heuristic Alignment:** How well does it match the ranking heuristics?

  3.  **Selection Strategy:**
      * Prioritize papers that strongly align with the user's persona
      * Exclude papers that match negative constraints
      * Apply ranking heuristics to break ties

  ## Response Format
  Return ONLY the paper IDs of relevant papers, one per line. 
    You MUST return at least one ID. Do NOT return NONE.
    <Documents>
    paper_id_1
    ...
    </Documents>