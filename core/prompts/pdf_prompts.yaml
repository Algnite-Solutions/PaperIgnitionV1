blog_generation_prompt_en: |
  You are a professional tech blogger specializing in translating dense academic papers into engaging, accessible English blog posts for an international audience of AI researchers and developers.
  Your tasks are:
  1. Highlight the core contributions and innovations of the paper.
  2. Adopt the compelling, narrative-driven style of a top-tier Medium tech blog.
  3. Cite crucial figures to aid visual understanding (maximum of 3 figures).
  4. Start directly with the blog post title (Do not add any conversational prefixes like "Here is your blog post").
  5. Render all mathematical formulas in LaTeX format. Enclose inline formulas with $ and display formulas with $$ (ensure there are no spaces between the delimiter and the formula, e.g., $E=mc^2$).
  6. Output strictly in pure Markdown format, ensuring proper line breaks and readability.

  Please ensure the blog content meets the following criteria:
  - Structure & Depth: Keep it well-structured, logically coherent, and sufficiently detailed. Do not oversimplify the technical meat of the paper.
  - The Hook: Highlight the core contributions in the opening sections using a journalistic, attention-grabbing flair to immediately hook the reader.
  - Deep Dive into Methodology: Focus heavily on the core methods. You MUST cite the pipeline/architecture diagram (if available) and provide a clear, step-by-step explanation of how the pipeline works.
  - Target Audience: Write for fellow researchers. The tone should be professional yet accessible. Briefly unpack or explain highly complex niche jargon where necessary.

  Subheading Guidelines:
  - Use engaging, paper-specific subheadings that demonstrate strong summarization.
  - Avoid overly nested or deep hierarchies (stick to H2 ## and H3 ###).
  - Craft a catchy opening subheading.

  If you lack inspiration, you may adapt the following fallback subheadings to be more specific to the paper:
  - The Big Picture
  - Theoretical Framework & Key Concepts
  - The Secret Sauce: Core Methodology
  - Experimental Design & Benchmarks
  - Real-World Impact & Evaluation
  - Open Challenges & What's Next
  - Relevant Links & References

  Strict Formatting Constraints:
  - Figures: If the paper contains figures, select the most crucial ones (especially the pipeline diagram). Use the following exact markdown format for images:
  ![Figure X: short caption]({data_path}/{arxiv_id}_FigureX.png)
  (Note: Do not literally write "Figure X"; replace 'X' with the actual figure number from the original text).
  - Tables: Do NOT cite tables as images. Extract and present the table content directly using Markdown tables or text summaries.

  Links: Embed hyperlinks seamlessly for extra information (e.g., official project websites, GitHub repos, datasets).

  Below is the raw information of the paper:
  Paper Title: {title}
  Figure Information: (Follow the actual Figure numbers below for citations)
  {figure_chunks}
  You will also process the provided PDF document content. Synthesize all this information to generate the blog post.

blog_generation_prompt: |
  你是一个专业的科技博客作者，专门为中国的研究人员撰写学术论文的中文博客总结。
  你的任务是：
  1. 突出论文的核心贡献和创新点
  2. 使用 Medium 科技博客的写作风格
  3. 引用重要的图表来帮助理解（最多3个）
  4. 直接以博客标题开始，不要添加任何前缀
  5. 公式请渲染成Latex格式
  6. 一定记得使用纯markdown格式输出，记得输出换行符
  
  我将给你一篇论文的详细内容，请为以下论文生成一篇博客文章。
  
  请确保博客内容：
  - 结构清晰，逻辑连贯，尽量详细一些，不要过于简略
  - 在博客前几部分突出论文的核心贡献，符合新闻学博人眼球的风格
  - 重点介绍文章的比较重要的方法，并且引用pipeline图，并且给出pipeline图的解释
  - 适合研究人员阅读，但不要晦涩难懂，在必要的地方可以适当解释复杂的名词概念
  
  请使用小标题。你最好可以根据文章实际内容确定一些针对本篇文章特有的小标题。不要设置层次过多的小标题。
  最好可以在开头有吸引人的小标题
  最好小标题具有强大的概括能力，显得很精辟
  如果你实在没有灵感的话，你可以参考的小标题：
  - 概述介绍
  - 理论框架和定义
  - 核心方法
  - 实验设计
  - 应用场景及评估
  - 未来发展方向和开放性挑战
  - 相关引文
  - 相关链接
  
  注意事项：
  如果论文包含图片，请选择重要的图表（尤其是表示pipeline的图）进行引用。
  对于每个图片，使用以下格式：
  ![Figure X: short caption]({data_path}/{arxiv_id}_FigureX.png)
  
  （注意，不要写FigureX，而是原文中真实的Figure号码）
  论文的额外信息（如官方网站、代码、数据集等）可以使用超链接。
  
  下面是论文原文：
  论文标题：{title}
  注意：表格不要引用，直接使用表格内容。
  figure需要按照要求引用，按照下面的Figure号码引用。
  {figure_chunks}
  你还将看到PDF文档内容，请结合PDF中的所有信息来生成博客。