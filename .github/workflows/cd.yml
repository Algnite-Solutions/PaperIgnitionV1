name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            PYTHON=/root/miniconda3/envs/paperignition/bin/python
            PIP=/root/miniconda3/envs/paperignition/bin/pip

            cd /root/PaperIgnitionV1
            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Installing dependencies ==="
            $PIP install -e .

            echo "=== Updating nginx config ==="
            cp /root/PaperIgnitionV1/beta_frontend/nginx.conf /etc/nginx/sites-available/paperignition
            nginx -t && systemctl reload nginx

            echo "=== Restarting backend ==="
            fuser -k 8000/tcp 2>/dev/null || true
            sleep 1
            nohup $PYTHON -m uvicorn backend.app.main:app --port 8000 > /root/paperignition-backend.log 2>&1 &
            sleep 3

            echo "=== Health check ==="
            curl -f http://localhost:8000/api/health || exit 1
            echo "=== Deploy successful: $(git rev-parse --short HEAD) ==="
