name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.env' --exclude='__pycache__' --exclude='*.pyc' --exclude='paperignition-backend.log'
          path: ./
          remote_path: /root/PaperIgnitionV1/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Install and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            PYTHON=/root/miniconda3/envs/paperignition/bin/python
            PIP=/root/miniconda3/envs/paperignition/bin/pip

            cd /root/PaperIgnitionV1

            echo "=== Installing dependencies ==="
            $PIP install -e .

            echo "=== Updating nginx config ==="
            cp /root/PaperIgnitionV1/beta_frontend/nginx.conf /etc/nginx/sites-available/paperignition
            nginx -t && systemctl reload nginx

            echo "=== Restarting backend ==="
            fuser -k 8000/tcp 2>/dev/null || true
            sleep 2
            nohup $PYTHON -m uvicorn backend.app.main:app --port 8000 > /root/paperignition-backend.log 2>&1 &

            echo "=== Health check (retrying up to 30s) ==="
            for i in $(seq 1 10); do
              sleep 3
              if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
                echo "=== Backend is up ==="
                break
              fi
              echo "Attempt $i: waiting for backend..."
              if [ "$i" = "10" ]; then
                echo "=== Backend failed to start. Log: ==="
                tail -20 /root/paperignition-backend.log
                exit 1
              fi
            done
            echo "=== Deploy successful ==="
